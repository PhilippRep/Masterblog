<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Welcome to My Flask Blog!</h1>
    <div class="posts">
        {% for blog in posts %}
            <h2>Post Title: {{blog["title"]}}</h2>
            <p><em>Written by: {{blog["author"]}}</em></p>
            <p>Post content: {{blog["content"]}}</p>
            <div class="post-actions">
            <form action="{{ url_for('update', post_id=blog['id']) }}" method="get" style="display:inline;">
                <button type="submit" class="update-btn">Update</button></form>
            <form action="{{ url_for('delete', post_id=blog['id']) }}" method="POST">
                <button type="submit" class="delete-btn">Delete Post</button></form>
            <form action="{{ url_for('like_post', post_id=blog['id']) }}" method="POST" style="display:inline;">
                <button type="submit" class="heart-btn {% if blog.liked %}active{% endif %}">&#10084;</button></form>
            </div>
        {% endfor %}
    </div>
    <p><a href="{{ url_for('add') }}">Add Post</a></p>
</body>
</html>
